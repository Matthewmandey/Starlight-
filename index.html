        <style>
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                font-family: Arial;
                background: #0f172a;
                color: white;
            }

            /* WELCOME */
            #welcome {
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
            }

            #welcome button {
                margin-top: 20px;
                padding: 12px 20px;
                border: none;
                border-radius: 12px;
                background: #334155;
                color: white;
            }

            /* HEADER */
            .header {
                padding: 15px;
                text-align: center;
                font-size: 20px;
            }

            /* GRID */
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 15px;
                padding: 15px;
            }

            .menu-card {
                background: #1e293b;
                padding: 20px;
                border-radius: 18px;
                text-align: center;
                cursor: pointer;
                transition: 0.2s;
            }

            .menu-card i {
                font-size: 30px;
            }

            .menu-card:hover {
                transform: scale(1.05);
            }

            /* CARD */
            .card {
                width: 100%;
                max-width: 400px;
                height: 250px;
                margin: auto;
                perspective: 1000px;
            }

            /* FLIP */
            .inner {
                width: 100%;
                height: 100%;
                position: relative;
                transform-style: preserve-3d;
                transition: 0.6s;
            }

            .flip {
                transform: rotateY(180deg);
            }

            .face {
                position: absolute;
                width: 100%;
                height: 100%;
                backface-visibility: hidden;
                background: #1e293b;
                border-radius: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                text-align: center;
            }

            .back {
                transform: rotateY(180deg);
            }

            /* OPTION */
            .option {
                background: #334155;
                padding: 10px;
                margin-top: 10px;
                border-radius: 10px;
            }

            .correct {
                background: green;
            }
            .wrong {
                background: red;
            }

            /* BTN */
            .btn {
                margin-top: 10px;
                padding: 10px;
                width: 100%;
                border: none;
                border-radius: 10px;
                background: #334155;
                color: white;
            }
        </style>
    </head>

            // ================= PARSER =================
            function parseSoal(raw) {
                const lines = raw.split("\n");
                const result = [];
                let q = "";

                lines.forEach(line => {
                    line = line.trim();
                    if (/^\d+\./.test(line)) {
                        q = line.replace(/^\d+\.\s*/, "");
                    } else if (line.startsWith("Jawaban:")) {
                        let a = line.replace("Jawaban:", "").trim();
                        result.push({ q, a });
                    }
                });

                return result;
            }

            // ================= DATA =================
            let data = parseSoal(rawData);
            let index = 0;
            let score = 0;

            // ================= START =================
            function startApp() {
                document.getElementById("welcome").style.display = "none";
                document.getElementById("main").style.display = "block";
                renderHome();
            }

            // ================= HOME =================
            function renderHome() {
                app.innerHTML = `
    <div class="grid">
      <div class="menu-card" onclick="renderFlash()">
        <i class='bx bx-layer'></i>
        <div>Flashcard</div>
      </div>
      <div class="menu-card" onclick="renderQuiz()">
        <i class='bx bx-edit'></i>
        <div>Latihan</div>
      </div>
      <div class="menu-card" onclick="renderBank()">
        <i class='bx bx-book'></i>
        <div>Bank Soal</div>
      </div>
    </div>
  `;
            }

            // ================= FLASH =================
            function renderFlash() {
                const item = data[index];
                let flipped = false;

                function draw() {
                    app.innerHTML = `
      <div class="card" onclick="flipCard()">
        <div class="inner ${flipped ? "flip" : ""}">
          <div class="face">${item.q}</div>
          <div class="face back">${item.a}</div>
        </div>
      </div>
      <button class="btn" onclick="next()">Next</button>
      <button class="btn" onclick="renderHome()">Home</button>
    `;
                }

                window.flipCard = () => {
                    flipped = !flipped;
                    draw();
                };

                window.next = () => {
                    index = (index + 1) % data.length;
                    renderFlash();
                };

                draw();
            }

            // ================= QUIZ =================
            function renderQuiz() {
                const item = data[index];

                let options = [item.a];
                while (options.length < 4) {
                    let rand = data[Math.floor(Math.random() * data.length)].a;
                    if (!options.includes(rand)) options.push(rand);
                }

                options.sort(() => Math.random() - 0.5);

                app.innerHTML = `
    <div class="card" style="height:auto;padding:20px">
      <h3>${item.q}</h3>
      ${options
          .map(
              o => `
        <div class="option" onclick="check('${o.replace(/'/g, "")}')">${o}</div>
      `
          )
          .join("")}
    </div>
    <button class="btn" onclick="renderHome()">Home</button>
  `;
            }

            // ================= CHECK =================
            window.check = function (selected) {
                const correct = data[index].a;
                const opts = document.querySelectorAll(".option");

                opts.forEach(el => {
                    if (el.innerText === correct) el.classList.add("correct");
                    else if (el.innerText === selected)
                        el.classList.add("wrong");
                });

                setTimeout(() => {
                    index = (index + 1) % data.length;
                    renderQuiz();
                }, 1000);
            };

            // ================= BANK =================
            function renderBank() {
                app.innerHTML = `
    ${data
        .map(
            (d, i) => `
      <div class="option" onclick="jump(${i})">
        ${i + 1}. ${d.q}
        <br><small>${d.a}</small>
      </div>
    `
        )
        .join("")}
    <button class="btn" onclick="renderHome()">Home</button>
  `;
            }

            window.jump = function (i) {
                index = i;
                renderQuiz();
            };
            
        </script>
